# ─────────────────────────────────────────────────────────────────────────────
# MockMate — Render.com Infrastructure as Code
# Push this file to GitHub → Render auto-creates/updates all services.
#
# Setup steps:
#  1. render.com → New → Blueprint → connect your GitHub repo
#  2. Set the environment variables below in the Render dashboard
#  3. Each service gets a unique *.onrender.com URL automatically
#
# Internal URLs use Render's private network (free, no egress costs):
#   http://mockmate-auth:8001  (internal only, not exposed to internet)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── API Gateway ─────────────────────────────────────────────────────────────
  - type: web
    name: mockmate-gateway
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.service
    dockerContext: ./backend
    dockerBuildArgs:
      SERVICE: services/gateway
      PORT: "8000"
    plan: starter          # $7/mo — always-on (no cold starts)
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: AUTH_SERVICE_URL
        value: http://mockmate-auth:8001
      - key: INTERVIEW_SERVICE_URL
        value: http://mockmate-interview:8004
      - key: QUESTION_SERVICE_URL
        value: http://mockmate-question:8003
      - key: EVALUATION_SERVICE_URL
        value: http://mockmate-evaluation:8005
      - key: PROFILE_SERVICE_URL
        value: http://mockmate-profile:8002
      - key: FRONTEND_URL
        value: https://yourdomain.com          # ← Replace with your Vercel URL
      - key: SECRET_KEY
        sync: false                             # Set manually in Render dashboard
      - key: ALGORITHM
        value: HS256

  # ── Auth Service ─────────────────────────────────────────────────────────────
  - type: web
    name: mockmate-auth
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.service
    dockerContext: ./backend
    dockerBuildArgs:
      SERVICE: services/auth
      PORT: "8001"
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: POSTGRES_SERVER
        fromDatabase:
          name: mockmate-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: mockmate-postgres
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: mockmate-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: mockmate-postgres
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: mockmate-postgres
          property: database
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256

  # ── Profile Service ───────────────────────────────────────────────────────────
  - type: web
    name: mockmate-profile
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.service
    dockerContext: ./backend
    dockerBuildArgs:
      SERVICE: services/profile
      PORT: "8002"
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: MONGO_URL
        sync: false                             # Set from MongoDB Atlas in dashboard
      - key: MINIO_ENDPOINT
        sync: false                             # Set from Cloudflare R2 in dashboard
      - key: MINIO_ACCESS_KEY
        sync: false
      - key: MINIO_SECRET_KEY
        sync: false
      - key: MINIO_BUCKET
        value: mockmate-uploads

  # ── Question Service ──────────────────────────────────────────────────────────
  - type: web
    name: mockmate-question
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.service
    dockerContext: ./backend
    dockerBuildArgs:
      SERVICE: services/question
      PORT: "8003"
    plan: starter
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false                             # Set in dashboard — pulls from AWS Secrets Manager or manual
      - key: OPENAI_API_KEY
        sync: false

  # ── Interview Service ─────────────────────────────────────────────────────────
  - type: web
    name: mockmate-interview
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.service
    dockerContext: ./backend
    dockerBuildArgs:
      SERVICE: services/interview
      PORT: "8004"
    plan: starter
    region: oregon
    healthCheckPath: /health
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 5                                 # 5GB persistent disk for video uploads
    envVars:
      - key: POSTGRES_SERVER
        fromDatabase:
          name: mockmate-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: mockmate-postgres
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: mockmate-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: mockmate-postgres
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: mockmate-postgres
          property: database
      - key: QUESTION_SERVICE_URL
        value: http://mockmate-question:8003
      - key: EVALUATION_SERVICE_URL
        value: http://mockmate-evaluation:8005
      - key: SECRET_KEY
        sync: false

  # ── Evaluation Service ────────────────────────────────────────────────────────
  - type: web
    name: mockmate-evaluation
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.service
    dockerContext: ./backend
    dockerBuildArgs:
      SERVICE: services/evaluation
      PORT: "8005"
    plan: starter
    region: oregon
    healthCheckPath: /health
    disk:
      name: eval-uploads
      mountPath: /app/uploads
      sizeGB: 5
    envVars:
      - key: INTERVIEW_SERVICE_URL
        value: http://mockmate-interview:8004
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: MOCKMATE_VLM_API_KEY
        sync: false

# ── Managed PostgreSQL ─────────────────────────────────────────────────────────
# Render-managed Postgres — use Supabase free tier instead to save $7/mo
# Comment this out and set POSTGRES_* env vars manually if using Supabase.
databases:
  - name: mockmate-postgres
    databaseName: mockmate_db
    user: mockmate
    plan: starter                               # $7/mo — or delete & use Supabase free
    region: oregon
