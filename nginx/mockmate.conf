server {
    listen 80;
    server_name _;

    # Serve React SPA static files
    root /home/ec2-user/MockMate/frontend/dist;
    index index.html;

    # ─── API routes: exact /health and /warmup endpoints ─────────────────────
    location = /health {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
    }

    location = /warmup {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
    }

    # ─── API routes: match both root and subpaths ────────────────────────────
    # e.g. /interviews (POST create) AND /interviews/abc-123 (GET by id)
    location ~ ^/auth(/|$) {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 500M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    location ~ ^/users(/|$) {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 500M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    location ~ ^/profile(/|$) {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 500M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    location ~ ^/interviews(/|$) {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 500M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    location ~ ^/questions(/|$) {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 500M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    location ~ ^/evaluation(/|$) {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 500M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ─── React SPA — serve index.html for ALL other routes ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
