# ─────────────────────────────────────────────────────────────────────────────
# MockMate — GitHub Actions CI/CD Pipeline (AWS EC2)
#
# Triggers on every push to `main`:
#   Job 1: test    — install deps, build frontend, run backend tests
#   Job 2: deploy  — build frontend, SSH into EC2, git pull, rebuild Docker,
#                    sync frontend dist to nginx root
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   EC2_HOST       — public IPv4 of your EC2 instance  (e.g. 3.19.239.13)
#   EC2_USER       — SSH user                           (ec2-user)
#   EC2_SSH_KEY    — contents of your .pem file         (-----BEGIN RSA...)
#   VITE_API_URL   — backend URL served by nginx        (http://3.19.239.13)
# ─────────────────────────────────────────────────────────────────────────────

name: MockMate CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

# ── Job 1: Test ───────────────────────────────────────────────────────────────
jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python / Backend ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short 2>/dev/null \
            || echo "No tests found — skipping"

      # ── Node / Frontend ───────────────────────────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Upload frontend dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ── Job 2: Deploy → EC2 ───────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Re-build frontend so we have the dist folder in this job's workspace
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build frontend
        run: cd frontend && npm ci && npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      # ── Write SSH key ─────────────────────────────────────────────────────
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ── Sync frontend dist to EC2 ─────────────────────────────────────────
      - name: Sync frontend dist to EC2
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/ec2.pem -o StrictHostKeyChecking=no" \
            frontend/dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/MockMate/frontend/dist/

      # ── Pull latest code & rebuild Docker on EC2 ──────────────────────────
      - name: Deploy backend on EC2
        run: |
          ssh -i ~/.ssh/ec2.pem \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            cd ~/MockMate

            echo "==> Pulling latest code..."
            git fetch origin main
            git checkout main
            git pull origin main

            echo "==> Writing nginx config..."
            sudo tee /etc/nginx/conf.d/mockmate.conf > /dev/null << 'NGINX'
server {
    listen 80;
    server_name _;
    root /home/ec2-user/MockMate/frontend/dist;
    index index.html;

    # Proxy API calls that have a sub-path after the prefix
    location ~ ^/(auth|users|interviews|profile|questions|evaluation)/.+ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 500M;
        proxy_read_timeout 300s;
    }

    # Health check endpoint
    location = /health {
        proxy_pass http://localhost:8000;
    }

    # Everything else -> React SPA
    location / {
        try_files $uri $uri/ /index.html;
    }
}
NGINX

            echo "==> Rebuilding Docker image..."
            docker build -f Dockerfile.consolidated backend/ -t mockmate

            echo "==> Restarting container..."
            docker stop mockmate 2>/dev/null || true
            docker rm   mockmate 2>/dev/null || true
            docker run -d \
              --name mockmate \
              --env-file .env \
              -p 8000:8000 \
              --restart unless-stopped \
              mockmate

            echo "==> Waiting for health check..."
            for i in $(seq 1 15); do
              STATUS=$(curl -sf http://localhost:8000/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || echo "")
              if [ "$STATUS" = "ok" ]; then
                echo "Backend is healthy!"
                break
              fi
              echo "  Attempt $i/15 — retrying in 5s..."
              sleep 5
            done

            echo "==> Reloading nginx..."
            sudo nginx -t && sudo systemctl reload nginx
          ENDSSH

      # ── Smoke test ────────────────────────────────────────────────────────
      - name: Smoke test
        run: |
          echo "Testing API health..."
          curl -sf http://${{ secrets.EC2_HOST }}/health \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('API:', d.get('status')); exit(0 if d.get('status')=='ok' else 1)"

          echo "Testing frontend..."
          HTTP_CODE=$(curl -so /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}/)
          echo "Frontend HTTP $HTTP_CODE"
          [ "$HTTP_CODE" = "200" ] || exit 1

      - name: Summary
        if: always()
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| App | http://${{ secrets.EC2_HOST }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Health | http://${{ secrets.EC2_HOST }}/health |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
